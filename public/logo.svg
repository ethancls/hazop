<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background with rounded corners -->
  <rect x="1" y="1" width="46" height="46" rx="12" fill="#0a0a0a"/>
  
  <!-- Molecular bonds (connections) -->
  <line x1="24" y1="24" x2="14" y2="14" stroke="#FF3E00" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="16" stroke="#FF3E00" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="16" y2="34" stroke="#FF3E00" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="32" stroke="#FF3E00" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="14" x2="10" y2="8" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="16" x2="42" y2="10" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="34" x2="10" y2="40" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="32" x2="42" y2="38" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Central atom (largest) -->
  <circle cx="24" cy="24" r="5" fill="#FF3E00"/>
  <circle cx="24" cy="24" r="2.5" fill="#0a0a0a"/>
  
  <!-- Secondary atoms -->
  <circle cx="14" cy="14" r="3.5" fill="#FF3E00"/>
  <circle cx="14" cy="14" r="1.5" fill="#0a0a0a"/>
  
  <circle cx="36" cy="16" r="3.5" fill="#FF3E00"/>
  <circle cx="36" cy="16" r="1.5" fill="#0a0a0a"/>
  
  <circle cx="16" cy="34" r="3.5" fill="#FF3E00"/>
  <circle cx="16" cy="34" r="1.5" fill="#0a0a0a"/>
  
  <circle cx="36" cy="32" r="3.5" fill="#FF3E00"/>
  <circle cx="36" cy="32" r="1.5" fill="#0a0a0a"/>
  
  <!-- Tertiary atoms (smaller, outer) -->
  <circle cx="10" cy="8" r="2" fill="#FF3E00"/>
  <circle cx="42" cy="10" r="2" fill="#FF3E00"/>
  <circle cx="10" cy="40" r="2" fill="#FF3E00"/>
  <circle cx="42" cy="38" r="2" fill="#FF3E00"/>
</svg>
