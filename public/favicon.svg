<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="#0a0a0a"/>
  
  <!-- Molecular bonds -->
  <line x1="16" y1="16" x2="9" y2="9" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="10" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="10" y2="23" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="22" stroke="#FF3E00" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="9" x2="5" y2="5" stroke="#FF3E00" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="28" y2="6" stroke="#FF3E00" stroke-width="1" stroke-linecap="round"/>
  <line x1="10" y1="23" x2="6" y2="27" stroke="#FF3E00" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="28" y2="26" stroke="#FF3E00" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Central atom -->
  <circle cx="16" cy="16" r="3.5" fill="#FF3E00"/>
  <circle cx="16" cy="16" r="1.5" fill="#0a0a0a"/>
  
  <!-- Secondary atoms -->
  <circle cx="9" cy="9" r="2.5" fill="#FF3E00"/>
  <circle cx="24" cy="10" r="2.5" fill="#FF3E00"/>
  <circle cx="10" cy="23" r="2.5" fill="#FF3E00"/>
  <circle cx="24" cy="22" r="2.5" fill="#FF3E00"/>
  
  <!-- Tertiary atoms -->
  <circle cx="5" cy="5" r="1.5" fill="#FF3E00"/>
  <circle cx="28" cy="6" r="1.5" fill="#FF3E00"/>
  <circle cx="6" cy="27" r="1.5" fill="#FF3E00"/>
  <circle cx="28" cy="26" r="1.5" fill="#FF3E00"/>
</svg>
